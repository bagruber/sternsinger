<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f1117" />
  <title>Gebäude-Marker</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js" defer></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── MAP ────────────────────────────────────────────────────── -->
<div id="map"></div>

<!-- ── TOP HUD ────────────────────────────────────────────────── -->
<div id="top-hud">
  <div id="group-chip" title="Gruppe wechseln">
    <span id="group-label">–</span>
  </div>
</div>

<!-- ── ZOOM WARNING ───────────────────────────────────────────── -->
<div id="zoom-warning" class="hidden">
  Bitte näher heranzoomen zum Markieren
</div>

<!-- ── BOTTOM BAR ─────────────────────────────────────────────── -->
<div id="bottom-bar">

  <div class="bar-row bar-row-top">
    <div id="period-toggle">
      <button class="period-btn active" data-period="morning" title="Vor Mittag">
        <i data-lucide="sun"></i>
        <span>VM</span>
      </button>
      <button class="period-btn" data-period="afternoon" title="Nach Mittag">
        <i data-lucide="sunset"></i>
        <span>NM</span>
      </button>
    </div>
    <div id="day-picker"></div>
  </div>

  <div class="bar-row bar-row-bottom">
    <div class="mode-group">
      <button class="mode-btn active" data-mode="idle" title="Navigieren">
        <i data-lucide="hand"></i>
        <span class="label">Nav</span>
      </button>
      <button class="mode-btn" data-mode="brush" title="Malen">
        <i data-lucide="paintbrush-2"></i>
        <span class="label">Malen</span>
      </button>
      <button class="mode-btn" data-mode="erase" title="Löschen">
        <i data-lucide="eraser"></i>
        <span class="label">Löschen</span>
      </button>
      <button class="mode-btn" data-mode="single" title="Einzeln">
        <i data-lucide="mouse-pointer-click"></i>
        <span class="label">Einzeln</span>
      </button>
    </div>

    <button id="undo-btn" title="Rückgängig">
      <i data-lucide="undo-2"></i>
      <span class="label">Undo</span>
    </button>
  </div>

</div>

<!-- ── GROUP MODAL ────────────────────────────────────────────── -->
<div id="group-modal" class="modal-backdrop">
  <div class="modal-box">
    <h2>Gruppe wählen</h2>
    <p>Alle Markierungen werden dieser Gruppe zugeordnet.</p>
    <div id="group-list"></div>
  </div>
</div>

<!-- ── COMMENT DIALOG ─────────────────────────────────────────── -->
<div id="comment-dialog" class="modal-backdrop hidden">
  <div class="modal-box">
    <h2>Kommentar</h2>
    <p>Gebäude: <code id="comment-building-id"></code></p>
    <textarea id="comment-input" placeholder="Kommentar eingeben …"></textarea>
    <div class="modal-actions">
      <button class="btn-secondary" id="comment-cancel">Abbrechen</button>
      <button class="btn-primary" id="comment-save">Speichern</button>
    </div>
  </div>
</div>

<!-- ── TOAST ──────────────────────────────────────────────────── -->
<div id="toast"></div>

<script type="module" src="js/app.js"></script>

</body>
</html>
