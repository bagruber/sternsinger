<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f1117" />
  <title>Gebäude-Marker</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>

  <!-- App styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── MAP ────────────────────────────────────────────────────── -->
<div id="map"></div>

<!-- ── TOP HUD ────────────────────────────────────────────────── -->
<div id="top-hud">
  <div id="group-chip" id="group-change" title="Gruppe wechseln">
    <div class="dot"></div>
    <span id="group-label">–</span>
  </div>
</div>

<!-- ── ZOOM WARNING ───────────────────────────────────────────── -->
<div id="zoom-warning" class="hidden">
  Bitte näher heranzoomen zum Markieren
</div>

<!-- ── BOTTOM BAR ─────────────────────────────────────────────── -->
<div id="bottom-bar">

  <!-- Color picker -->
  <div id="color-picker"></div>

  <!-- Mode buttons -->
  <div class="mode-group">
    <button class="mode-btn active" data-mode="brush" title="Malen">
      🖌️
      <span class="label">Malen</span>
    </button>
    <button class="mode-btn" data-mode="erase" title="Löschen">
      🧹
      <span class="label">Löschen</span>
    </button>
    <button class="mode-btn" data-mode="single" title="Einzeln">
      ☝️
      <span class="label">Einzeln</span>
    </button>
  </div>

  <!-- Undo -->
  <button id="undo-btn" title="Rückgängig">
    ↩️
    <span class="label">Undo</span>
  </button>

</div>

<!-- ── GROUP MODAL ────────────────────────────────────────────── -->
<div id="group-modal" class="modal-backdrop">
  <div class="modal-box">
    <h2>Gruppe eingeben</h2>
    <p>Gib einen Gruppenname ein. Alle Markierungen werden dieser Gruppe zugeordnet.</p>
    <input
      type="text"
      id="group-input"
      placeholder="z. B. gruppe_a"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="none"
      spellcheck="false"
    />
    <div class="modal-actions">
      <button class="btn-primary" id="group-confirm">Bestätigen</button>
    </div>
  </div>
</div>

<!-- ── COMMENT DIALOG ─────────────────────────────────────────── -->
<div id="comment-dialog" class="modal-backdrop hidden">
  <div class="modal-box">
    <h2>Kommentar</h2>
    <p>Gebäude: <code id="comment-building-id"></code></p>
    <textarea id="comment-input" placeholder="Kommentar eingeben …"></textarea>
    <div class="modal-actions">
      <button class="btn-secondary" id="comment-cancel">Abbrechen</button>
      <button class="btn-primary" id="comment-save">Speichern</button>
    </div>
  </div>
</div>

<!-- ── TOAST ──────────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── GROUP CHANGE HANDLER ───────────────────────────────────── -->
<script>
  document.getElementById("group-chip").addEventListener("click", () => {
    document.getElementById("group-change").click?.();
  });
</script>

<!-- ── APP ───────────────────────────────────────────────────── -->
<script type="module" src="js/app.js"></script>

</body>
</html>
